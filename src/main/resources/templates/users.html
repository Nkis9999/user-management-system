<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>會員管理系統</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#4e73df,#1cc88a);
min-height:100vh;
padding-top:60px;
}


/* 主卡片 */
.card-box{
width:950px;
margin:auto;
border-radius:20px;
}


/* 標題 */

.header-title{
font-weight:600;
letter-spacing:3px;
margin-bottom:30px;
text-align:center;
}


/* 表格置中 */

.table td, .table th{
vertical-align:middle;
text-align:center;
}



/* ===== 工具列 ===== */

.toolbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}



/* ===== 回主頁按鈕 ===== */

.home-btn{

background:#6c757d;
color:white;

height:45px;
width:150px;

font-size:18px;
font-weight:500;

border-radius:8px;

display:flex;
align-items:center;
justify-content:center;

text-decoration:none;

}

.home-btn:hover{

background:#5a6268;
color:white;

}



/* ===== 搜尋區 ===== */

.search-area{

display:flex;
align-items:center;

}



/* 搜尋輸入框 */

.search-input{

height:45px;
width:260px;

font-size:16px;

border-radius:8px;

margin-right:10px;

}



/* 搜尋按鈕 */

.search-btn{

height:45px;
width:90px;

font-size:18px;

border-radius:8px;

display:flex;
align-items:center;
justify-content:center;

}



/* 操作按鈕 */

.btn-action{
min-width:90px;
margin:2px;
}



/* 下方資訊 */

.footer-bar{
margin-top:20px;
font-size:15px;
}


</style>

</head>


<body>



<div class="card shadow-lg card-box">

<div class="card-body p-4">


<h3 class="header-title">

會員管理系統

</h3>



<!-- 工具列 -->

<div class="toolbar">


<!-- 回主頁 -->

<a href="/loginSuccess"

class="home-btn">

← 回主頁

</a>




<!-- 搜尋 -->

<form action="/users"
method="get"
class="search-area">


<input type="text"

name="keyword"

th:value="${keyword}"

class="form-control search-input"

placeholder="輸入帳號搜尋">



<button type="submit"

class="btn btn-primary search-btn">

搜尋

</button>


</form>


</div>




<!-- 表格 -->

<table class="table table-striped table-hover table-bordered">


<thead class="table-dark">

<tr>

<th style="width:80px">

ID

</th>


<th style="width:200px">

帳號

</th>


<th>

Email

</th>


<th style="width:300px">

操作

</th>


</tr>

</thead>



<tbody>

<tr th:each="user : ${users}">


<td th:text="${user.id}"></td>


<td th:text="${user.username}"></td>


<td th:text="${user.email}"></td>



<td>


<!-- 刪除 -->

<form action="/deleteUser"

method="post"

style="display:inline;">


<input type="hidden"

name="id"

th:value="${user.id}">



<button class="btn btn-danger btn-sm btn-action">

刪除

</button>


</form>




<!-- SUPER ADMIN -->

<span th:if="${role=='SUPER_ADMIN'}">



<form action="/makeAdmin"

method="post"

style="display:inline;">


<input type="hidden"

name="id"

th:value="${user.id}">


<button class="btn btn-warning btn-sm btn-action">

設為ADMIN

</button>


</form>



<form action="/removeAdmin"

method="post"

style="display:inline;">


<input type="hidden"

name="id"

th:value="${user.id}">


<button class="btn btn-dark btn-sm btn-action">

取消ADMIN

</button>


</form>


</span>



</td>


</tr>

</tbody>

</table>




<!-- 下方資訊 -->


<div class="row footer-bar align-items-center">


<div class="col">

會員總數：

<b th:text="${total}"></b>

</div>



<div class="col text-center">


<a th:if="${page > 0}"

th:href="@{/users(page=${page-1},keyword=${keyword})}"

class="btn btn-outline-primary me-2">

上一頁

</a>



第 <b th:text="${page+1}"></b> 頁



<a th:if="${page < totalPages-1}"

th:href="@{/users(page=${page+1},keyword=${keyword})}"

class="btn btn-outline-primary ms-2">

下一頁

</a>



</div>



<div class="col text-end">

共

<b th:text="${totalPages}"></b>

頁

</div>



</div>



</div>

</div>


</body>
</html>
