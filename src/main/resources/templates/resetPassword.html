<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>重設密碼</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

body{
height:100vh;
background: linear-gradient(135deg,#4e73df,#1cc88a);
display:flex;
justify-content:center;
align-items:center;
}

.card-box{
width:380px;
border-radius:15px;
}

</style>

</head>

<body>

<div class="card shadow-lg p-4 card-box">

<h3 class="text-center mb-4">

重設密碼

</h3>


<!-- 錯誤訊息 -->

<div th:if="${error}"
class="alert alert-danger">

<span th:text="${error}"></span>

</div>


<form th:action="@{/resetPassword}" method="post">


<!-- 隱藏 username -->

<input type="hidden"
name="username"
th:value="${username}">


<div class="mb-3">

<label class="form-label">

新密碼

</label>

<input type="password"
name="newPassword"
class="form-control"
required>

</div>


<div class="mb-3">

<label class="form-label">

確認密碼

</label>

<input type="password"
name="confirmPassword"
class="form-control"
required>

</div>


<button type="submit"
class="btn btn-success w-100">

重設密碼

</button>

</form>


<div class="text-center mt-3">

<a href="/login">

返回登入頁

</a>

</div>


</div>

</body>
</html>
