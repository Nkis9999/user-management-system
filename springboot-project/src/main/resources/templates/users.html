<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>會員列表</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#4e73df,#1cc88a);
min-height:100vh;
padding-top:50px;
}

.card-box{
width:800px;
margin:auto;
border-radius:15px;
}

</style>

</head>

<body>

<div class="card shadow-lg p-4 card-box">

<h3 class="text-center mb-4">會員列表</h3>


<!-- 回登入成功頁 -->
<div class="mb-3">

<a href="/loginSuccess" class="btn btn-secondary">

← 回登入成功頁

</a>

</div>



<!-- 搜尋 -->
<form action="/users" method="get"
class="row g-2 mb-3">

<div class="col">

<input type="text"
name="keyword"
th:value="${keyword}"
class="form-control"
placeholder="輸入帳號搜尋">

</div>

<div class="col-auto">

<button type="submit"
class="btn btn-primary">

搜尋

</button>

</div>

</form>



<!-- 表格 -->

<table class="table table-striped table-hover">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>帳號</th>
<th>Email</th>
</tr>

</thead>

<tbody>

<tr th:each="user : ${users}">

<td th:text="${user.id}"></td>

<td th:text="${user.username}"></td>

<td th:text="${user.email}"></td>

</tr>

</tbody>

</table>



<!-- 總數 -->

<div class="mb-3">

會員總數：

<span th:text="${total}"></span>

</div>



<!-- 分頁 -->

<div class="d-flex justify-content-between">


<div>

<a th:if="${page > 0}"
th:href="@{/users(page=${page-1},keyword=${keyword})}"
class="btn btn-outline-primary">

上一頁

</a>

</div>



<div>

<a th:if="${page < totalPages-1}"
th:href="@{/users(page=${page+1},keyword=${keyword})}"
class="btn btn-outline-primary">

下一頁

</a>

</div>

</div>



</div>

</body>
</html>
