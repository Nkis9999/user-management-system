<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>會員登入</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card {
            width: 380px;
            border-radius: 15px;
        }
    </style>
</head>
<body>

<div class="card shadow-lg p-4 login-card">
    <h3 class="text-center mb-4">會員登入</h3>
	
	<div th:if="${param.resetSuccess}"
		 id="msg"	
	     class="alert alert-success">
		密碼重設成功
	</div>
			
	<!--密碼修改成功-->
	<div th:if="${param.pwdSuccess}" 
		 id="pwdMsg"
		 class="alert alert-success">
		密碼修改成功，請重新登入
	</div>
	
    <!-- 登入失敗 -->
    <div th:if="${param.error}" class="alert alert-danger">
        帳號或密碼錯誤
    </div>

    <!-- 登出成功 -->
    <div th:if="${param.logout}" id="logoutMsg" class="alert alert-success">
        已成功登出
    </div>

    <form th:action="@{/doLogin}" method="post">

        <!-- CSRF (Spring Security 必備) -->
<!--        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />-->

        <div class="mb-3">
            <label class="form-label">帳號</label>
            <input type="text" name="username" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">密碼</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">登入</button>
    </form>

    <div class="text-center mt-3">
        <a th:href="@{/register}" class="text-decoration-none">
            還沒有帳號？立即註冊
        </a>
    </div>
	<div class="text-center mt-2">
		<a th:href="@{/forgotPassword}">忘記密碼?</a>
	</div>
	
	<div th:if="${param.deleteSuccess}"
	class="alert alert-warning">

	帳號已刪除

	</div>
	
	
</div>
<script>

setTimeout(function(){

    let messages = ["msg","pwdMsg","logoutMsg"];

    messages.forEach(function(id){

        let el = document.getElementById(id);

        if(el){
            el.style.display = "none";
        }

    });

},3000);

</script>
</body>
</html>
