<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>會員註冊</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            background: linear-gradient(135deg, #36b9cc, #4e73df);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .register-card {
            width: 420px;
            border-radius: 15px;
        }
    </style>
</head>
<body>

<div class="card shadow-lg p-4 register-card">
    <h3 class="text-center mb-4">會員註冊</h3>

    <!-- 註冊成功/失敗訊息 -->
    <div th:if="${param.success}" class="alert alert-success">
        註冊成功！請登入
    </div>

    <div th:if="${error}" class="alert alert-danger">
        <span th:text="${error}"></span>
    </div>

    <form th:action="@{/register}" method="post" enctype="multipart/form-data">

<!--         Spring Security CSRF -->
<!--        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />-->

        <div class="mb-3">
            <label class="form-label">帳號</label>
            <input type="text" name="username" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">密碼</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">E-Mail</label>
            <input type="email" name="email" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">上傳照片</label>
            <input type="file" name="photo" class="form-control">
        </div>

        <button type="submit" class="btn btn-primary w-100">
            註冊
        </button>
    </form>

    <div class="text-center mt-3">
        <a th:href="@{/login}" class="text-decoration-none">
            已經有帳號？返回登入
        </a>
    </div>
</div>

</body>
</html>
