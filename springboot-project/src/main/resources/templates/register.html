<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>會員註冊</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
height:100vh;
background:linear-gradient(135deg,#4e73df,#1cc88a);
display:flex;
justify-content:center;
align-items:center;
}

.register-card{
width:400px;
border-radius:15px;
}

</style>

</head>


<body>


<div class="card shadow-lg p-4 register-card">

<h3 class="text-center mb-4">

會員註冊

</h3>


<!-- 註冊失敗提示 -->

<div th:if="${error}"
     class="alert alert-danger text-center">

<span th:text="${error}"></span>

</div>


<form th:action="@{/register}"
      method="post">


<div class="mb-3">

<label class="form-label">

帳號

</label>

<input type="text"
       name="username"
       class="form-control"
       required>

</div>



<div class="mb-3">

<label class="form-label">

密碼

</label>

<input type="password"
       name="password"
       class="form-control"
       required>

</div>



<div class="mb-3">

<label class="form-label">

Email

</label>

<input type="email"
       name="email"
       class="form-control"
       required>

</div>



<button class="btn btn-success w-100">

註冊

</button>

</form>


<div class="text-center mt-3">

<a th:href="@{/login}"
   class="text-decoration-none">

已有帳號？返回登入

</a>

</div>


</div>

</body>

</html>
