<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>忘記密碼</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

body{
height:100vh;
background: linear-gradient(135deg,#4e73df,#1cc88a);
display:flex;
justify-content:center;
align-items:center;
}

.card-box{
width:380px;
border-radius:15px;
}

</style>

</head>

<body>

<div class="card shadow-lg p-4 card-box">

<h3 class="text-center mb-4">

忘記密碼

</h3>


<!-- 錯誤訊息 -->

<div th:if="${error}"
class="alert alert-danger">

<span th:text="${error}"></span>

</div>


<form th:action="@{/forgotPassword}" method="post">


<div class="mb-3">

<label class="form-label">

請輸入帳號

</label>

<input type="text"
name="username"
class="form-control"
required>

</div>


<button type="submit"
class="btn btn-primary w-100">

下一步

</button>

</form>


<div class="text-center mt-3">

<a href="/login">

返回登入頁

</a>

</div>


</div>

</body>
</html>
