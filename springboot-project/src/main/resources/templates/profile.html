<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>會員資料</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
height:100vh;
background:linear-gradient(135deg,#4e73df,#1cc88a);
display:flex;
justify-content:center;
align-items:center;
}

.profile-card{
width:900px;
background:white;
border-radius:10px;
padding:30px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.avatar{
width:180px;
height:180px;
object-fit:cover;
border-radius:50%;
box-shadow:0 3px 10px rgba(0,0,0,0.15);
border:none;
}

.account-warning{
background:#fff3cd;
color:#dc3545;
padding:8px 12px;
border-radius:6px;
font-size:14px;
margin-top:5px;
border:1px solid #ffeeba;
}

.section-title{
font-weight:bold;
margin-top:20px;
margin-bottom:10px;
}

</style>

</head>
<body>

<div class="profile-card">

<h3 class="mb-4">會員資料</h3>

<div class="row">

<!-- 左邊資料 -->
<div class="col-md-8">

<form th:action="@{/updateProfile}" method="post" enctype="multipart/form-data">

<div class="mb-3">
<label class="form-label">帳號</label>
<input type="text" class="form-control"
       th:value="${user.username}"
       disabled>

<div class="account-warning">
⚠ 帳號名稱為系統識別碼，無法修改
</div>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email"
       class="form-control"
       name="email"
       th:value="${user.email}"
       required>
</div>

<div class="mb-3">
<label class="form-label">更換頭像</label>
<input type="file"
       class="form-control"
       name="photo"
       accept="image/*"
       onchange="previewImage(event)">
</div>

<button class="btn btn-primary w-100 mt-3">
更新資料
</button>
<br><br>
</form>

</div>

<!-- 右邊頭像 -->
<div class="col-md-4 text-center">

<p>目前頭像</p>

<img class="avatar mb-3"
     th:src="${user.imgName != null} ? 
        @{/upload/{img}(img=${user.imgName})} : 
        @{/images/default-avatar.png}">

<!-- 新頭像預覽 (預設隱藏) -->

<div id="previewBlock" style="display:none;">

<p class="mt-3">新頭像預覽</p>

<img 
id="avatarPreview"
class="avatar">

</div>

</div>

<hr>

<!-- 修改密碼 -->

<div class="section-title">修改密碼</div>

<form th:action="@{/changePassword}" method="post">

<div class="row">

<div class="col-md-4 mb-3">
<input type="password"
       name="oldPassword"
       class="form-control"
       placeholder="舊密碼"
       required>
</div>

<div class="col-md-4 mb-3">
<input type="password"
       name="newPassword"
       class="form-control"
       placeholder="新密碼"
       required>
</div>

<div class="col-md-4 mb-3">
<input type="password"
       name="confirmPassword"
       class="form-control"
       placeholder="確認新密碼"
       required>
</div>

</div>

<button class="btn btn-warning">
修改密碼
</button>
<br><br>
</form>

<hr>

<!-- 刪除帳號 -->

<div class="section-title text-danger">危險操作</div>

<form th:action="@{/deleteAccount}" method="post"
      onsubmit="return confirm('確定要刪除帳號嗎？此操作無法復原');">

<button class="btn btn-danger">
刪除帳號
</button>

</form>

<a href="/loginSuccess" class="btn btn-secondary w-100 mt-3">
返回
</a>


</div>

<script>
	
	function previewImage(event){

	const file = event.target.files[0];

	if(!file) return;

	const reader = new FileReader();

	reader.onload = function(){

	document.getElementById("avatarPreview").src = reader.result;

	document.getElementById("previewBlock").style.display = "block";

	}

	reader.readAsDataURL(file);

	}
</script>

</body>
</html>
