<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>個人資料</title>
</head>

<body>

<h2>個人資料</h2>

<form th:action="@{/updateProfile}" method="post">

帳號：
<input type="text"
       name="username"
       th:value="${user.username}"
       readonly>

<br><br>

Email：
<input type="text"
       name="email"
       th:value="${user.email}">

<button type="submit">修改資料</button>

<p th:if="${param.success}" style="color: green;" id="msg">修改資料成功!</p>
</form>

<script>setTimeout(function(){
document.getElementById("msg").style.display="none";
} , 3000);</script>

<br><br>
<hr>
<h4 class="mt-4">修改密碼</h4>

<form th:action="@{/changePassword}" method="post">

    <div class="mb-3">
        <label>舊密碼</label>
        <input type="password" name="oldPassword"
               class="form-control" required>
    </div>

    <div class="mb-3">
        <label>新密碼</label>
        <input type="password" name="newPassword"
               class="form-control" required>
    </div>

    <div class="mb-3">
        <label>確認新密碼</label>
        <input type="password" name="confirmPassword"
               class="form-control" required>
    </div>

    <button type="submit"
            class="btn btn-warning">
        修改密碼
    </button>

</form>

<!-- 成功提示 -->
<div th:if="${success}" style="color:green">
    <span th:text="${success}"></span>
</div>

<!-- 錯誤提示 -->
<div th:if="${error}" style="color:red">
    <span th:text="${error}"></span>
</div>

<br><br>

<a href="/loginSuccess"><button>回到登入成功頁</button></a>

</body>
</html>
