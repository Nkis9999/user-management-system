<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>個人資料</title>
</head>

<body>

<h2>個人資料</h2>

<form th:action="@{/updateProfile}" method="post">

帳號：
<input type="text"
       name="username"
       th:value="${user.username}"
       readonly>

<br><br>

Email：
<input type="text"
       name="email"
       th:value="${user.email}">

<br><br>

<button type="submit">

修改資料

</button>

</form>

</body>
</html>
