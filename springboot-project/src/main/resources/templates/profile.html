<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>個人資料</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
height:100vh;
background:linear-gradient(135deg,#4e73df,#1cc88a);
display:flex;
justify-content:center;
align-items:center;
}

.profile-card{
width:750px;
border-radius:15px;
}

.avatar{
width:180px;
height:180px;
object-fit:cover;
border-radius:10px;
border:3px solid #ddd;
}

</style>

</head>

<body>

<div class="card shadow-lg p-4 profile-card">

<h3 class="text-center mb-4">
個人資料
</h3>

<!-- 修改成功提示 -->

<div th:if="${param.success}"
     id="successMsg"
     class="alert alert-success text-center">

修改資料成功

</div>

<div class="row">

<!-- 左邊資料 -->

<div class="col-md-7">

<form th:action="@{/updateProfile}"
      method="post"
      enctype="multipart/form-data">

<div class="mb-3">

<label class="form-label">
帳號
</label>

<input type="text"
       name="username"
       th:value="${user.username}"
       class="form-control"
       readonly>

</div>


<div class="mb-3">

<label class="form-label">
Email
</label>

<input type="text"
       name="email"
       th:value="${user.email}"
       class="form-control">

</div>


<div class="mb-3">

<label class="form-label">
上傳頭像
</label>

<input type="file"
       name="photo"
       class="form-control">

</div>


<button class="btn btn-primary w-100">

修改資料

</button>

</form>

</div>


<!-- 右邊頭像 -->

<div class="col-md-5 text-center">

<img th:if="${user.imgName != null}"
     th:src="@{'/upload/' + ${user.imgName}}"
     class="avatar mb-3">

<div th:if="${user.imgName == null}">

<img src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
     class="avatar">

</div>

<p>

<b th:text="${user.username}"></b>

</p>

</div>

</div>


<hr class="mt-4">


<h4 class="text-center mb-3">

修改密碼

</h4>


<form th:action="@{/changePassword}"
      method="post">


<div class="mb-3">

<label>舊密碼</label>

<input type="password"
       name="oldPassword"
       class="form-control"
       required>

</div>


<div class="mb-3">

<label>新密碼</label>

<input type="password"
       name="newPassword"
       class="form-control"
       required>

</div>


<div class="mb-3">

<label>確認新密碼</label>

<input type="password"
       name="confirmPassword"
       class="form-control"
       required>

</div>


<button class="btn btn-warning w-100">

修改密碼

</button>

</form>

<hr>

<form action="/deleteAccount" method="post"
onsubmit="return confirm('確定要刪除帳號嗎？');">

<button style="
width:100%;
padding:12px;
background:#dc3545;
color:white;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
cursor:pointer;
">

刪除帳號

</button>

</form>


<!-- 成功提示 -->

<div th:if="${success}"
     class="alert alert-success mt-3">

<span th:text="${success}"></span>

</div>


<!-- 錯誤提示 -->

<div th:if="${error}"
     class="alert alert-danger mt-3">

<span th:text="${error}"></span>

</div>



<br>


<a href="/loginSuccess">

<button class="btn btn-secondary w-100">

回登入成功頁

</button>

</a>


</div>


<script>

setTimeout(function(){

let msg=document.getElementById("successMsg");

if(msg){
msg.style.display="none";
}

},2000);

</script>

</body>
</html>
